version: "3"
services:
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: hands-up-zookeeper
    platform: linux/amd64
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka
    container_name: hands-up-kafka
    platform: linux/amd64
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: hands-up-zookeeper:2181
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://hands-up-kafka:9092,OUTSIDE://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
    depends_on:
      - zookeeper

  redis:
    image: redis
    container_name: hands-up-redis
    platform: linux/arm64
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: [ "redis-server", "--requirepass", "${REDIS_HOST_PASSWORD}" ]

  mysql:
    image: mysql:8.0
    container_name: hands-up-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hands-up-app
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: hands-up-mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://hands-up-mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: hands-up-redis
      REDIS_PORT: "6379"
      REDIS_HOST_PASSWORD: ${REDIS_HOST_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: hands-up-kafka:9092
    restart: always
    depends_on:
      - redis
      - mysql
volumes:
  redis_data:
  mysql_data:
